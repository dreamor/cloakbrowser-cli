name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate]
    environment: release
    permissions:
      id-token: write
      contents: read
    outputs:
      published_version: ${{ steps.resolve-version.outputs.RESOLVED_VERSION }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - run: node --version && npm --version
      - run: npm ci
      - name: Resolve version (bump if already published)
        id: resolve-version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          VERSION="${TAG_VERSION}"

          while npm view "@dreamor/cloakbrowser-cli@${VERSION}" version >/dev/null 2>&1; do
            echo "⚠️ Version ${VERSION} already published on npm, bumping patch..."
            VERSION=$(node -e "
              const p = '${VERSION}'.split('.');
              const patch = parseInt(p[2] || '0', 10);
              console.log(p[0] + '.' + p[1] + '.' + (patch + 1));
            ")
          done

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "📋 Auto-bumped: ${TAG_VERSION} → ${VERSION}"
            npm version "$VERSION" --no-git-tag-version
          else
            echo "✅ Version ${VERSION} is available, no bump needed"
          fi

          echo "RESOLVED_VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
      - run: npm run build
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, publish-npm]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Extract version
        id: version
        run: |
          PUBLISHED="${{ needs.publish-npm.outputs.published_version }}"
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          VERSION="${PUBLISHED:-$TAG_VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Extract changelog
        id: changelog
        run: |
          version="${{ steps.version.outputs.VERSION }}"
          section=$(sed -n "/## \[${version}\]/,/## \[/p" CHANGELOG.md | head -n -1 | tail -n +2)
          echo "BODY<<EOF" >> "$GITHUB_OUTPUT"
          echo "$section" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
